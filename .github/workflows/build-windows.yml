name: Build FBX Wheels (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python: "3.7"
            platform: win_amd64

          - os: windows-latest
            python: "3.9"
            platform: win_amd64

          - os: windows-latest
            python: "3.11"
            platform: win_amd64

          - os: windows-latest
            python: "3.13"
            platform: win_amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Show build target
        run: |
          python --version
          echo Platform: ${{ matrix.platform }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sip==6.6.2

      - name: Restore FBX SDK cache
        id: cache-fbxsdk
        uses: actions/cache@v6
        with:
          path: cache/fbxsdk
          key: fbxsdk-2020.3.9-${{ runner.os }}

      - name: Install FBX SDK and FBX Python bindings
        run: |
          python scripts/install_fbx.py

      - name: Build wheel
        run: |
          python scripts/build.py

      - name: Install wheel
        shell: bash
        run: |
          python -m pip install ./dist/*.whl

      - name: Test wheel
        run: |
          python scripts/test.py -o "${{ runner.temp }}/test_output" --ascii

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: fbx-2020.3.9-py${{ matrix.python }}-${{ matrix.platform }}
          path: dist/*.whl
