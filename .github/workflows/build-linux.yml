name: Build FBX Wheels (Linux)

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Restore FBX SDK and FBX Python bindings cache
              id: cache-fbx
              uses: actions/cache@v6
              with:
                  path: |
                      cache
                  key: fbx-2020.3.9-${{ runner.os }}

            - name: Clear all *.whl files in the cache folder
              if: always()
              run: |
                  rm -f cache/**/*.whl

            - name: Install FBX SDK and FBX Python bindings
              run: |
                  python scripts/install_fbx.py

            - name: Enable PEP 484 type stubs
              run: |
                  echo -e "\n[tool.sip.bindings.fbx_module]\npep484-pyi = true" >> cache/fbxbind/pyproject.toml

            - name: Build wheels
              uses: pypa/cibuildwheel@v2.21.0
              # Use version compatible with Python 3.7
              with:
                package-dir: "cache/fbxbind"
              env:
                CIBW_BUILD: "cp37-manylinux_x86_64 cp39-manylinux_x86_64 cp311-manylinux_x86_64 cp313-manylinux_x86_64"
                CIBW_SKIP: "*-manylinux_i686 *-musllinux_* pp*"
                CIBW_MANYLINUX_X86_64_IMAGE: "manylinux2014"
                CIBW_BUILD_VERBOSITY: "1"
                CIBW_BEFORE_BUILD: "pip install --force-reinstall -v sip==6.6.2"
                CIBW_ENVIRONMENT: "FBXSDK_ROOT=/project/cache/fbxsdk"

            - name: Upload wheels
              uses: actions/upload-artifact@v6
              with:
                  name: linux-cibuildwheel-wheels
                  path: wheelhouse/*.whl
