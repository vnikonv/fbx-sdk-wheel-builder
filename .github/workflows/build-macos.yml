name: Build FBX Wheels (macOS)

on:
    workflow_dispatch:

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS x86_64
                    - os: macos-15-intel
                      python: "3.7"
                      py: "37"
                      platform: macosx_x86_64
                      arch: x86_64

                    - os: macos-15-intel
                      python: "3.9"
                      py: "39"
                      platform: macosx_x86_64
                      arch: x86_64

                    - os: macos-15-intel
                      python: "3.11"
                      py: "311"
                      platform: macosx_x86_64
                      arch: x86_64

                    - os: macos-15-intel
                      python: "3.13"
                      py: "313"
                      platform: macosx_x86_64
                      arch: x86_64

                    # macOS arm64
                    - os: macos-latest
                      python: "3.9"
                      py: "39"
                      platform: macosx_arm64
                      arch: arm64

                    - os: macos-latest
                      python: "3.11"
                      py: "311"
                      platform: macosx_arm64
                      arch: arm64

                    - os: macos-latest
                      python: "3.13"
                      py: "313"
                      platform: macosx_arm64
                      arch: arm64

                    # macOS universal2
                    - os: macos-latest
                      python: "3.9"
                      py: "39"
                      platform: macosx_universal2
                      arch: universal2

                    - os: macos-latest
                      python: "3.11"
                      py: "311"
                      platform: macosx_universal2
                      arch: universal2

                    - os: macos-latest
                      python: "3.13"
                      py: "313"
                      platform: macosx_universal2
                      arch: universal2

        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v7

            - name: Restore FBX SDK and FBX Python bindings cache
              id: cache-fbx
              uses: actions/cache@v6
              with:
                  path: cache
                  key: fbx-2020.3.9-${{ runner.os }}

            - name: Clear all *.whl and *.pkg files in the cache folder
              if: always()
              run: |
                  rm -f cache/**/*.whl
                  rm -f cache/**/*.pkg

            - name: Install FBX SDK and FBX Python bindings
              run: |
                  python scripts/install_fbx.py

            - name: Enable PEP 484 type stubs
              run: |
                  python scripts/enable_hints.py

            - name: Build and test wheels
              uses: pypa/cibuildwheel@v2.21.0
              with:
                  package-dir: "cache/fbxbind"
              env:
                  CIBW_BUILD: "cp${{ matrix.py }}-macosx_${{ matrix.arch }}"
                  CIBW_ARCHS_MACOS: "${{ matrix.arch }}"
                  CIBW_BUILD_VERBOSITY: "1"
                  CIBW_TEST_SKIP: "cp313-*"
                  CIBW_BEFORE_BUILD: "pip install --force-reinstall sip==6.6.2"
                  CIBW_ENVIRONMENT: "FBXSDK_ROOT=${{ github.workspace }}/cache/fbxsdk"
                  CIBW_TEST_COMMAND: >
                      python -c "import fbx; import os; print(os.path.dirname(fbx.__file__))" && 
                      python {project}/scripts/test.py -o {project}/test_output

            - name: Upload wheels
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: fbx-2020.3.9-py${{ matrix.python }}-${{ matrix.platform }}
                  path: wheelhouse/*.whl
                  if-no-files-found: ignore
