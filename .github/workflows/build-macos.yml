name: Build FBX Wheels (macOS)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS x86_64
          - os: macos-13
            python: "3.7"
            platform: macosx_10_15_x86_64
            arch: x86_64

          - os: macos-13
            python: "3.9"
            platform: macosx_10_15_x86_64
            arch: x86_64

          - os: macos-13
            python: "3.11"
            platform: macosx_10_15_x86_64
            arch: x86_64

          - os: macos-13
            python: "3.13"
            platform: macosx_10_15_x86_64
            arch: x86_64

          # macOS arm64
          - os: macos-14
            python: "3.7"
            platform: macosx_11_0_arm64
            arch: arm64

          - os: macos-14
            python: "3.9"
            platform: macosx_11_0_arm64
            arch: arm64

          - os: macos-14
            python: "3.11"
            platform: macosx_11_0_arm64
            arch: arm64

          - os: macos-14
            python: "3.13"
            platform: macosx_11_0_arm64
            arch: arm64

          # macOS universal2
          - os: macos-14
            python: "3.7"
            platform: macosx_10_15_universal2
            arch: universal2

          - os: macos-14
            python: "3.9"
            platform: macosx_10_15_universal2
            arch: universal2

          - os: macos-14
            python: "3.11"
            platform: macosx_10_15_universal2
            arch: universal2

          - os: macos-14
            python: "3.13"
            platform: macosx_10_15_universal2
            arch: universal2

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Show build target
        run: |
          python --version
          echo Platform: ${{ matrix.platform }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sip==6.6.2

      - name: Restore FBX SDK cache
        id: cache-fbxsdk
        uses: actions/cache@v6
        with:
          path: cache/fbxsdk
          key: fbxsdk-2020.3.9-${{ runner.os }}

      - name: Restore FBX Python Bindings cache
        id: cache-fbxpython
        uses: actions/cache@v6
        with:
          path: cache/fbxbind
          key: fbxbindings-2020.3.9-${{ runner.os }}

      - name: Install FBX SDK and FBX Python bindings
        run: |
          python scripts/install_fbx.py

      - name: Build wheel
        env:
          FBX_ARCH: ${{ matrix.arch }}
        run: |
          python scripts/build.py

      - name: Install and test wheel
        run: |
          python -m pip install ./dist/*.whl
          python scripts/test.py -o "${{ runner.temp }}/test_output" --ascii

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: fbx-2020.3.9-py${{ matrix.python }}-${{ matrix.platform }}
          path: dist/*.whl
